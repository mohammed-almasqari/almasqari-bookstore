# ============================================================================
#  متجر الكتب الرقمية — تشغيل كامل عبر Docker Compose
#  يشغّل قاعدة بيانات PostgreSQL + تطبيق Next.js.
#  مناسب للتشغيل المحلي ولاستخدامه قالبًا في Coolify.
# ============================================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # المنفذ مكشوف داخليًا فقط؛ أزل التعليق للوصول من خارج الشبكة عند الحاجة
    # ports:
    #   - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # داخل شبكة compose يكون مضيف قاعدة البيانات هو اسم الخدمة "db"
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public"
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "3000:3000"

volumes:
  db_data:
  uploads_data:
