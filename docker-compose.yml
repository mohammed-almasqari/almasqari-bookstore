# ============================================================================
#  متجر الكتب الرقمية — Docker Compose (Next.js + PostgreSQL)
#  توجيه صريح عبر Traefik إلى دومين book.dalilai.net على المنفذ 3000.
#  app على شبكتين: internal (للوصول إلى قاعدة البيانات) و coolify (ليصل إليها Traefik).
# ============================================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - AUTH_SECRET=${AUTH_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_NAME=${ADMIN_NAME}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - NEXT_PUBLIC_SITE_NAME=${NEXT_PUBLIC_SITE_NAME}
      - NEXT_PUBLIC_CURRENCY=${NEXT_PUBLIC_CURRENCY}
      - PAYPAL_ENV=${PAYPAL_ENV}
      - NEXT_PUBLIC_PAYPAL_CLIENT_ID=${NEXT_PUBLIC_PAYPAL_CLIENT_ID}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_REPLY_TO=${EMAIL_REPLY_TO}
      - UPLOAD_DIR=/app/uploads
    expose:
      - "3000"
    networks:
      - internal
      - coolify
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.book-http.entryPoints=http
      - traefik.http.routers.book-http.rule=Host(`book.dalilai.net`)
      - traefik.http.routers.book-http.service=book-app
      - traefik.http.routers.book-https.entryPoints=https
      - traefik.http.routers.book-https.rule=Host(`book.dalilai.net`)
      - traefik.http.routers.book-https.tls=true
      - traefik.http.routers.book-https.tls.certresolver=letsencrypt
      - traefik.http.routers.book-https.service=book-app
      - traefik.http.services.book-app.loadbalancer.server.port=3000
    volumes:
      - uploads_data:/app/uploads

networks:
  internal:
  coolify:
    external: true

volumes:
  db_data:
  uploads_data:
