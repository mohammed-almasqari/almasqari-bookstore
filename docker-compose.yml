# ============================================================================
#  متجر الكتب الرقمية — تشغيل كامل عبر Docker Compose
#  يشغّل قاعدة بيانات PostgreSQL + تطبيق Next.js.
#  مناسب للتشغيل المحلي ولاستخدامه قالبًا في Coolify.
# ============================================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # المنفذ مكشوف داخليًا فقط؛ أزل التعليق للوصول من خارج الشبكة عند الحاجة
    # ports:
    #   - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # متغيّر سحري لـ Coolify (صيغة القائمة، بلا قيمة): يربط Traefik بمنفذ التطبيق 3000.
      # الدومين نفسه (book.dalilai.net) يُضبط من docker_compose_domains في Coolify.
      - SERVICE_FQDN_APP_3000
      # داخل شبكة compose يكون مضيف قاعدة البيانات هو اسم الخدمة "db".
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - AUTH_SECRET=${AUTH_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_NAME=${ADMIN_NAME}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - NEXT_PUBLIC_SITE_NAME=${NEXT_PUBLIC_SITE_NAME}
      - NEXT_PUBLIC_CURRENCY=${NEXT_PUBLIC_CURRENCY}
      - PAYPAL_ENV=${PAYPAL_ENV}
      - NEXT_PUBLIC_PAYPAL_CLIENT_ID=${NEXT_PUBLIC_PAYPAL_CLIENT_ID}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_REPLY_TO=${EMAIL_REPLY_TO}
      - UPLOAD_DIR=/app/uploads
    expose:
      - "3000"
    volumes:
      - uploads_data:/app/uploads

volumes:
  db_data:
  uploads_data:
